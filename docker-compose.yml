version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: granify
      POSTGRES_USER: granify
      POSTGRES_PASSWORD: granify
    ports:
      - "5433:5432"
    volumes:
      - postgres_granify_data:/var/lib/postgresql/data

volumes:
  postgres_granify_data:
