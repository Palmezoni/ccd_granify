<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#059669"/>
  <g transform="translate(256,256)">
    <!-- Chart bars representing financial growth -->
    <rect x="-120" y="-40" width="60" height="120" rx="8" fill="white" opacity="0.9"/>
    <rect x="-45" y="-90" width="60" height="170" rx="8" fill="white" opacity="0.9"/>
    <rect x="30" y="-140" width="60" height="220" rx="8" fill="white" opacity="0.9"/>
    <!-- Trend line -->
    <polyline points="-90,-10 -15,-60 60,-110" stroke="white" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Arrow up -->
    <polygon points="60,-130 80,-100 100,-130" fill="white" opacity="0.6"/>
  </g>
</svg>
